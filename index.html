<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UnitPulse Onboarding Checklist</title>
<style>
  :root{
    color-scheme: light;
    --bg:#fbf9f5; --card:#ffffff; --ink:#1c1b18; --muted:#6b6358; --line:#ece7dd;
    --green:#1a4534; --green-2:#2f5d49; --green-3:#4f7460; --green-soft:#e9efe9;
    --cream:#fcfaf7; --sage:#7d8a6b; --taupe:#86796b; --sand:#9a8a72; --slate:#728176;
    --shadow:0 1px 2px rgba(28,27,24,.04), 0 10px 30px rgba(28,27,24,.06);
    --serif:"Libre Caslon Text", Georgia, "Times New Roman", serif;
    --sans:"Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "PingFang SC","Hiragino Sans GB","Microsoft YaHei", Arial, sans-serif;
    --radius:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans);
    background:radial-gradient(1100px 460px at 82% -10%, #edf1ea 0%, rgba(237,241,234,0) 62%), var(--bg);
    color:var(--ink); line-height:1.62; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:940px;margin:0 auto;padding:34px 20px 84px}

  /* Masthead */
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:20px}
  .logo{width:38px;height:38px;border-radius:11px;background:#141414;display:grid;place-items:center;
    box-shadow:0 4px 12px rgba(20,20,20,.18)}
  .logo svg{width:22px;height:22px;color:var(--cream)}
  .wordmark{font-family:var(--sans);font-weight:750;font-size:21px;letter-spacing:-.02em;color:var(--ink)}
  .wm-accent{color:var(--green)}
  .brandtag{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:var(--green);
    background:var(--green-soft);padding:6px 13px;border-radius:999px}
  .brandtag .dot{width:6px;height:6px;border-radius:50%;background:var(--green);
    box-shadow:0 0 0 3px rgba(26,69,52,.14)}
  h1{font-family:var(--serif);font-weight:400;font-size:38px;line-height:1.12;
    margin:16px 0 10px;letter-spacing:-.01em;color:var(--green)}
  .sub{color:var(--muted);font-size:16px;max-width:700px;margin:0}

  /* Toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:24px 0 16px}
  .seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px;box-shadow:var(--shadow)}
  .seg button{border:0;background:transparent;color:var(--muted);font-family:var(--sans);font-weight:650;font-size:14px;
    padding:7px 17px;border-radius:999px;cursor:pointer;transition:.15s}
  .seg button.active{background:var(--green);color:var(--cream)}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);font-family:var(--sans);font-weight:650;font-size:13.5px;
    padding:8px 15px;border-radius:999px;cursor:pointer;box-shadow:var(--shadow);transition:.15s}
  .btn:hover{border-color:#d8d0c2;transform:translateY(-1px)}
  .spacer{flex:1 1 auto}

  /* Progress */
  .progress-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px 22px;margin-bottom:28px}
  .progress-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .progress-top .lbl{font-weight:700;font-size:12.5px;letter-spacing:.06em;color:var(--muted)}
  .progress-top .pct{font-family:var(--serif);font-size:30px;font-weight:400;color:var(--green);font-variant-numeric:tabular-nums}
  .bar{height:12px;border-radius:999px;background:#eee8dc;overflow:hidden;margin:13px 0 9px}
  .bar > i{display:block;height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,var(--green),var(--green-3));transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .count{font-size:13.5px;color:var(--muted);font-variant-numeric:tabular-nums}

  /* Phase */
  .phase{margin:0 0 24px}
  .phase-head{display:flex;align-items:center;gap:13px;margin:0 2px 13px}
  .phase-ico{flex:none;width:42px;height:42px;border-radius:13px;background:var(--green-soft);
    color:var(--green);display:grid;place-items:center;border:1px solid #dde7dd}
  .phase-ico svg{width:22px;height:22px}
  .phase-titles{flex:1 1 auto;min-width:0}
  .phase-name{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:-.01em;color:var(--green)}
  .phase-desc{font-size:13px;color:var(--muted)}
  .phase-count{flex:none;font-size:12.5px;font-weight:700;color:var(--muted);
    background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 12px;font-variant-numeric:tabular-nums}

  /* Item */
  .item{background:var(--card);border:1px solid var(--line);border-radius:15px;margin-bottom:11px;
    box-shadow:var(--shadow);overflow:hidden;transition:border-color .15s,background .15s}
  .item.done{background:#f5f7f2;border-color:#dde7d9}
  .item-row{display:flex;align-items:flex-start;gap:14px;padding:16px 17px;cursor:pointer}
  .chk{flex:none;width:24px;height:24px;border-radius:8px;border:2px solid #cfc8ba;background:#fff;
    margin-top:1px;display:grid;place-items:center;cursor:pointer;transition:.15s}
  .chk svg{width:14px;height:14px;opacity:0;transform:scale(.6);transition:.15s;color:var(--cream)}
  .item.done .chk{background:var(--green);border-color:var(--green)}
  .item.done .chk svg{opacity:1;transform:scale(1)}
  .item-main{flex:1 1 auto;min-width:0}
  .item-title{font-size:16px;font-weight:650;letter-spacing:-.005em;color:var(--ink)}
  .item.done .item-title{color:#6a7466;text-decoration:line-through;text-decoration-color:#bcd0bf}
  .item-meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;align-items:center}
  .owner{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:999px;letter-spacing:.01em}
  .owner.up{color:var(--green);background:var(--green-soft)}
  .owner.you{color:#6f6151;background:#f1ece3}
  .owner.both{color:#566044;background:#eaeee2}
  .chev{flex:none;color:#bdb4a4;margin-top:4px;transition:transform .2s}
  .item.open .chev{transform:rotate(180deg)}

  .detail{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .item.open .detail{max-height:1500px}
  .detail-in{padding:2px 17px 19px 55px;border-top:1px solid var(--line);margin-top:-1px}
  .field{margin-top:15px}
  .field-lbl{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .field-lbl .pip{width:7px;height:7px;border-radius:50%}
  .pip.what{background:var(--green)} .pip.why{background:var(--taupe)}
  .pip.benefit{background:var(--sage)} .pip.how{background:var(--sand)} .pip.verify{background:var(--slate)}
  .field p{margin:0;font-size:14.5px;color:#3c3a33}
  .field.benefit p{color:var(--green);font-weight:560}
  ol.how{margin:5px 0 0;padding-left:20px}
  ol.how li{font-size:14.5px;color:#3c3a33;margin:3px 0}
  .verify-box{display:flex;gap:9px;align-items:flex-start;background:#edf1ec;
    border-radius:11px;padding:10px 13px;font-size:14px;color:var(--green)}
  .verify-box svg{flex:none;width:17px;height:17px;margin-top:1px}

  /* Legend / footer */
  .legend{display:flex;flex-wrap:wrap;gap:14px;align-items:center;font-size:12.5px;color:var(--muted);
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin-bottom:26px;box-shadow:var(--shadow)}
  .legend b{color:var(--ink)}
  .legend .owner{font-size:11px}
  footer{color:var(--muted);font-size:12.5px;text-align:center;margin-top:32px;line-height:1.7}
  footer .ft-brand{font-family:var(--serif);color:var(--green);font-size:15px}

  @media (max-width:560px){
    h1{font-size:30px}.detail-in{padding-left:17px}.progress-top .pct{font-size:25px}
  }
  @media print{
    body{background:#fff}.toolbar{display:none}.item{break-inside:avoid;box-shadow:none}
    .detail{max-height:none!important}.chev{display:none}.progress-card,.legend{box-shadow:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <span class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 13 7 13 9.5 6 13.5 18 16 11 18 13 22 13"/></svg>
    </span>
    <span class="wordmark">Unit<span class="wm-accent">Pulse</span></span>

  <p class="sub" data-i="subtitle"></p>

  <div class="toolbar">
    <div class="seg" role="tablist" aria-label="Language">
      <button id="langEn" onclick="setLang('en')">English</button>
      <button id="langZh" onclick="setLang('zh')">中文</button>
    </div>
    <div class="spacer"></div>
    <button class="btn" onclick="toggleAll(true)" data-i="expandAll"></button>
    <button class="btn" onclick="toggleAll(false)" data-i="collapseAll"></button>
    <button class="btn" onclick="resetAll()" data-i="reset"></button>

  </div>

  <div class="progress-card">
    <div class="progress-top">
      <span class="lbl" data-i="progressLabel"></span>
      <span class="pct" id="pct">0%</span>
    </div>
    <div class="bar"><i id="barFill"></i></div>
    <div class="count" id="count"></div>
  </div>

  <div class="legend">
    <span><b data-i="ownerLabel"></b>:</span>
    <span class="owner up" data-i="ownerUp"></span>
    <span class="owner you" data-i="ownerYou"></span>
    <span class="owner both" data-i="ownerBoth"></span>
    <span data-i="legendNote"></span>
  </div>

  <div id="phases"></div>

  <footer>
    <span class="ft-brand">UnitPulse</span><br>
    <span data-i="footer1"></span><br>
    <span data-i="footer2"></span>
  </footer>
</div>

/* ---------- state ---------- */
var LANG = "en", DONE = {}, store = {
  get:function(k){try{return localStorage.getItem(k)}catch(e){return null}},
  set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}}
};
try{
  var sl=store.get("up_lang"); if(sl==="en"||sl==="zh") LANG=sl;
  var sd=store.get("up_done"); if(sd) DONE=JSON.parse(sd)||{};
}catch(e){DONE={};}

var ALL_ITEMS=[]; PHASES.forEach(function(p){p.items.forEach(function(it){ALL_ITEMS.push(it.id)})});

function save(){ store.set("up_lang",LANG); store.set("up_done",JSON.stringify(DONE)); }

/* ---------- render ---------- */
function applyStatic(){
  var u=UI[LANG];
  document.documentElement.lang = (LANG==="zh"?"zh-CN":"en");
  document.querySelectorAll("[data-i]").forEach(function(el){
    var k=el.getAttribute("data-i"); if(u[k]!=null) el.textContent=u[k];
  });
  document.getElementById("langEn").classList.toggle("active",LANG==="en");
  document.getElementById("langZh").classList.toggle("active",LANG==="zh");
  document.title = u.title;
}

function renderPhases(){
  var u=UI[LANG], root=document.getElementById("phases"), html="";
  PHASES.forEach(function(p){
    var loc=p[LANG];
    var total=p.items.length, done=p.items.filter(function(it){return DONE[it.id]}).length;
    html+='<section class="phase">';
    html+='<div class="phase-head"><div class="phase-ico">'+IC[p.icon]+'</div>'+
          '<div class="phase-titles"><div class="phase-name">'+loc.name+'</div>'+
          '<div class="phase-desc">'+loc.desc+'</div></div>'+
          '<span class="phase-count">'+done+'/'+total+'</span></div>';
    p.items.forEach(function(it){
      var d=it[LANG], isDone=!!DONE[it.id];
      var ownerCls=it.owner, ownerTxt=(it.owner==="up"?u.ownerUp:it.owner==="you"?u.ownerYou:u.ownerBoth);
      var howLis=d.how.map(function(s){return "<li>"+s+"</li>"}).join("");
      html+='<div class="item'+(isDone?' done':'')+'" id="'+it.id+'">';
      html+= '<div class="item-row" onclick="toggleOpen(\''+it.id+'\')">';
      html+=  '<span class="chk" role="checkbox" aria-checked="'+isDone+'" tabindex="0" '+
              'onclick="event.stopPropagation();toggleDone(\''+it.id+'\')" '+
              'onkeydown="if(event.key===\' \'||event.key===\'Enter\'){event.preventDefault();event.stopPropagation();toggleDone(\''+it.id+'\')}">'+IC.check+'</span>';
      html+=  '<div class="item-main"><div class="item-title">'+d.title+'</div>'+
              '<div class="item-meta"><span class="owner '+ownerCls+'">'+ownerTxt+'</span></div></div>';
      html+=  '<span class="chev">'+IC.chev+'</span>';
      html+= '</div>';
      html+= '<div class="detail"><div class="detail-in">'+
              '<div class="field what"><div class="field-lbl"><span class="pip what"></span>'+u.whatLabel+'</div><p>'+d.what+'</p></div>'+
              '<div class="field why"><div class="field-lbl"><span class="pip why"></span>'+u.whyLabel+'</div><p>'+d.why+'</p></div>'+
              '<div class="field benefit"><div class="field-lbl"><span class="pip benefit"></span>'+u.benefitLabel+'</div><p>'+d.benefit+'</p></div>'+
              '<div class="field how"><div class="field-lbl"><span class="pip how"></span>'+u.howLabel+'</div><ol class="how">'+howLis+'</ol></div>'+
              '<div class="field verify"><div class="field-lbl"><span class="pip verify"></span>'+u.verifyLabel+'</div>'+
                '<div class="verify-box">'+IC.verify+'<span>'+d.verify+'</span></div></div>'+
             '</div></div>';
      html+='</div>';
    });
    html+='</section>';
  });
  root.innerHTML=html;
}

function updateProgress(){
  var total=ALL_ITEMS.length, done=ALL_ITEMS.filter(function(id){return DONE[id]}).length;
  var pct= total? Math.round(done/total*100):0;
  document.getElementById("pct").textContent=pct+"%";
  document.getElementById("barFill").style.width=pct+"%";
  document.getElementById("count").textContent=UI[LANG].countTpl(done,total);
}

function refreshPhaseCounts(){
  var sections=document.querySelectorAll(".phase");
  PHASES.forEach(function(p,i){
    var total=p.items.length, done=p.items.filter(function(it){return DONE[it.id]}).length;
    var c=sections[i] && sections[i].querySelector(".phase-count");
    if(c) c.textContent=done+'/'+total;
  });
}

/* ---------- actions ---------- */
function toggleDone(id){
  DONE[id]=!DONE[id];
  var el=document.getElementById(id);
  if(el){ el.classList.toggle("done",!!DONE[id]);
    var chk=el.querySelector(".chk"); if(chk) chk.setAttribute("aria-checked",!!DONE[id]); }
  updateProgress(); refreshPhaseCounts(); save();
}
function toggleOpen(id){ var el=document.getElementById(id); if(el) el.classList.toggle("open"); }
function toggleAll(open){ document.querySelectorAll(".item").forEach(function(el){el.classList.toggle("open",open)}); }
function resetAll(){
  var msg = LANG==="zh" ? "确定要清除所有勾选进度吗？" : "Clear all checked progress?";
  if(!confirm(msg)) return;
  DONE={}; save(); renderPhases(); updateProgress();
}
function setLang(l){ LANG=l; save(); applyStatic(); renderPhases(); updateProgress(); }

/* ---------- init ---------- */
applyStatic(); renderPhases(); updateProgress();
</script>
</body>
</html>
